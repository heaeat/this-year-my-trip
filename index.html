<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올해의 여행</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--bg:#fff;--bg-hover:#f7f7f5;--bg-sidebar:#fbfbfa;--text:#37352f;--text-sub:#787774;--text-muted:#b4b4b0;--border:#e9e9e7;--border-light:#f1f1ef;--accent:#2eaadc;--accent-bg:#e8f4f9;--green:#4dab60;--green-bg:#edf8ef;--orange:#d9730d;--orange-bg:#fdecd3;--red:#e03e3e;--red-bg:#fce4e4;--radius:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
::selection{background:var(--accent-bg)}

.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{text-align:center;max-width:320px;width:90%}
.login-box .icon{font-size:48px;margin-bottom:20px}
.login-box h1{font-size:26px;font-weight:700;letter-spacing:-1px;margin-bottom:6px}
.login-box p{font-size:14px;color:var(--text-sub);margin-bottom:32px}
.google-btn{display:inline-flex;align-items:center;gap:10px;padding:10px 24px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:14px;font-weight:500;color:var(--text);transition:all .15s}
.google-btn:hover{background:var(--bg-hover)}.google-btn svg{width:18px;height:18px}

.setup-screen{min-height:100vh;display:flex;align-items:center;justify-content:center}
.setup-box{max-width:420px;width:92%}.setup-box h2{font-size:20px;font-weight:700;margin-bottom:6px}
.setup-box .desc{font-size:14px;color:var(--text-sub);margin-bottom:24px}.setup-actions{display:flex;gap:8px}

.header{padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-light);background:#fff;position:sticky;top:0;z-index:50}
.header-left{display:flex;align-items:center;gap:8px}.header-left .icon{font-size:20px}.header-left h1{font-size:16px;font-weight:600;letter-spacing:-.3px}
.header-right{display:flex;align-items:center;gap:10px}.header-right img{width:26px;height:26px;border-radius:50%}.header-right .name{font-size:13px;color:var(--text-sub)}
.logout-btn{padding:4px 10px;border-radius:var(--radius);border:1px solid var(--border);background:#fff;font-size:12px;color:var(--text-sub);transition:all .15s}.logout-btn:hover{background:var(--bg-hover)}

.app-layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 50px)}

.sidebar{border-right:1px solid var(--border-light);background:var(--bg-sidebar);padding:16px 14px;overflow-y:auto}
.sidebar-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;padding:0 6px;margin-bottom:8px}
.trip-all{padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .12s;margin-bottom:6px;font-size:14px;font-weight:500;color:var(--text-sub);border:none;width:100%;background:transparent;text-align:left}
.trip-all:hover{background:#efefed}.trip-all.active{background:#e8e8e5;color:var(--text)}.trip-all .ico{font-size:20px}
.trip-card{padding:14px 14px 12px;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:6px;position:relative;background:#fff;border:1.5px solid var(--border-light);overflow:hidden}
.trip-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .15s;border-radius:10px 0 0 10px}
.trip-card:hover{border-color:var(--border);box-shadow:0 2px 8px rgba(0,0,0,.04)}.trip-card:hover::before{background:var(--accent)}
.trip-card.active{border-color:var(--accent);background:#f8fcfe;box-shadow:0 2px 12px rgba(46,170,220,.1)}.trip-card.active::before{background:var(--accent)}
.trip-card.past{opacity:.55;filter:grayscale(.3)}.trip-card.past:hover{opacity:.75}.trip-card.past.active{opacity:.8;filter:grayscale(.1)}
.trip-card .card-top{display:flex;align-items:flex-start;gap:12px}
.trip-card .card-emoji{font-size:28px;line-height:1}.trip-card .card-info{flex:1;min-width:0}
.trip-card .card-month{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:-.2px;line-height:1}
.trip-card .card-city{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.5px;margin-top:3px;line-height:1.2}
.trip-card .card-dates{font-size:11px;color:var(--text-muted);margin-top:4px}
.trip-card .card-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:9px;border-top:1px solid var(--border-light)}
.trip-card .card-stats{display:flex;gap:8px;font-size:12px;color:var(--text-sub);align-items:center}
.trip-card .card-money{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text);letter-spacing:-.2px}
.trip-card .card-progress{margin-top:8px;height:3px;border-radius:2px;background:var(--border-light);overflow:hidden}
.trip-card .card-progress-fill{height:100%;border-radius:2px;background:var(--green);transition:width .4s}
.trip-card .delete-trip{position:absolute;right:8px;top:8px;width:22px;height:22px;border-radius:5px;border:none;background:transparent;color:var(--text-muted);font-size:13px;display:none;align-items:center;justify-content:center}
.trip-card:hover .delete-trip{display:flex}.trip-card .delete-trip:hover{background:var(--red-bg);color:var(--red)}
.trip-card .edit-trip{position:absolute;right:34px;top:8px;width:22px;height:22px;border-radius:5px;border:none;background:transparent;color:var(--text-muted);font-size:13px;display:none;align-items:center;justify-content:center}
.trip-card:hover .edit-trip{display:flex}.trip-card .edit-trip:hover{background:var(--accent-bg);color:var(--accent)}
.settle-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);flex-shrink:0}
.add-trip-btn{padding:10px 12px;border-radius:8px;border:1.5px dashed var(--border);width:100%;text-align:center;font-size:14px;font-weight:500;background:transparent;color:var(--text-muted);margin-top:6px;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:6px}
.add-trip-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

.main{padding:24px 32px 60px;max-width:960px;overflow-x:hidden}
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border-light);border:1px solid var(--border-light);border-radius:8px;overflow:hidden;margin-bottom:28px}
.summary-card{background:#fff;padding:16px 18px}.summary-card .label{font-size:13px;color:var(--text-muted);margin-bottom:3px}
.summary-card .value{font-size:19px;font-weight:700;letter-spacing:-.3px;font-variant-numeric:tabular-nums}
.summary-card .value.green{color:var(--green)}.summary-card .value.orange{color:var(--orange)}.summary-card .value.red{color:var(--red)}

.main-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.main-top h2{font-size:22px;font-weight:700;letter-spacing:-.5px}.main-top .sub{font-size:13px;color:var(--text-muted);margin-top:2px}
.add-res-btn{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--border);background:#fff;font-size:13px;font-weight:500;color:var(--text);transition:all .15s;display:flex;align-items:center;gap:5px}
.add-res-btn:hover{background:var(--bg-hover)}

.filters{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap;row-gap:6px}
.filter-btn{padding:5px 12px;border-radius:var(--radius);border:none;font-size:13px;font-weight:500;background:transparent;color:var(--text-sub);transition:all .1s}
.filter-btn:hover{background:var(--bg-hover)}.filter-btn.active{background:var(--text);color:#fff}
.filter-sep{width:100%;height:0;margin:0}
.filter-select{padding:5px 10px;border-radius:var(--radius);border:1.5px solid var(--border-light);font-size:13px;font-weight:500;background:#fff;color:var(--text);cursor:pointer;outline:none;transition:border-color .1s}
.filter-select:focus,.filter-select:hover{border-color:var(--accent)}

.cat-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}
.cat-summary-card{background:#fff;border:1.5px solid var(--border-light);border-radius:10px;padding:16px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.cat-summary-card:hover{border-color:var(--accent);box-shadow:0 2px 10px rgba(46,170,220,.1)}
.cat-sum-top{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.cat-sum-icon{font-size:22px;line-height:1}
.cat-sum-name{font-size:14px;font-weight:600;flex:1;color:var(--text)}
.cat-sum-count{font-size:11px;color:var(--text-muted);background:var(--bg-hover);padding:2px 7px;border-radius:10px;font-weight:500}
.cat-sum-amount{font-size:18px;font-weight:700;letter-spacing:-.3px;margin-bottom:8px;font-variant-numeric:tabular-nums}
.cat-sum-badges{display:flex;gap:4px;flex-wrap:wrap}
.cat-sum-badge{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500}
.cat-sum-badge.done{color:var(--green);background:var(--green-bg)}
.cat-sum-badge.need{color:var(--orange);background:var(--orange-bg)}
.cat-sum-badge.none{color:var(--text-muted);background:var(--bg-hover)}

.res-table{border:1px solid var(--border-light);border-radius:8px;overflow:hidden}
.res-card{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .08s;position:relative}
.res-card:last-child{border-bottom:none}.res-card:hover{background:var(--bg-hover)}
.res-card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;margin-top:1px}
.res-card-icon.flight{background:#bfdbfe}.res-card-icon.hotel{background:#fde68a}.res-card-icon.car{background:#bbf7d0}
.res-card-icon.transport{background:#ddd6fe}.res-card-icon.diving{background:#a5f3fc}.res-card-icon.usim{background:#e5e7eb}.res-card-icon.dining{background:#fecdd3}.res-card-icon.sightseeing{background:#fed7aa}
.res-card-body{flex:1;min-width:0}
.res-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.res-card-name{font-weight:600;font-size:14px;line-height:1.35;color:var(--text)}
.res-card-amount{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0;line-height:1.35}
.res-card-amount.zero{color:var(--text-muted);font-weight:400}
.res-card-fx{font-size:11px;color:var(--text-muted);font-weight:400;text-align:right;margin-top:1px}
.res-card-meta{font-size:12px;color:var(--text-muted);margin-top:3px}
.res-card-bottom{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.res-card-people{font-size:12px;color:var(--text-sub)}
.res-card-share{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-bg);padding:2px 7px;border-radius:4px}
.res-card-payer{font-size:12px;color:var(--text-sub);display:inline-flex;align-items:center;gap:3px}
.member-chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:10px;font-size:12px;font-weight:500;background:var(--accent-bg);color:var(--accent)}
.member-chip.me{background:#dcfce7;color:#166534}
.member-chip.guest{background:var(--bg-hover);color:var(--text-muted);font-style:italic}
.res-card .del-btn{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:5px;border:none;background:transparent;color:var(--text-muted);font-size:14px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .1s}
.res-card:hover .del-btn{opacity:1}.res-card .del-btn:hover{background:var(--red-bg);color:var(--red)}

.status-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.1px}
.status-tag.done{background:#10b981;color:#fff}.status-tag.need{background:#ef4444;color:#fff}.status-tag.none{background:#e5e7eb;color:#6b7280}
.cat-tag{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:500}
.cat-tag.flight{background:#d3e5ef;color:#2a6490}.cat-tag.hotel{background:#fdecc8;color:#89632a}.cat-tag.car{background:#dbeddb;color:#2f6e3b}
.cat-tag.transport{background:#e8deee;color:#6940a5}.cat-tag.diving{background:#d3e5ef;color:#2a6490}.cat-tag.usim{background:#e3e2e0;color:#5a5a57}
.person-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:12px;font-weight:500;margin:1px}
.people-cell{display:flex;flex-wrap:wrap;gap:3px}
.total-row{display:grid;grid-template-columns:1fr 120px 36px;padding:12px 16px;border-top:1px solid var(--border);background:var(--bg-sidebar);font-size:14px;font-weight:600}
.total-row .total-amount{text-align:right;font-variant-numeric:tabular-nums}
.empty-state{padding:48px;text-align:center;color:var(--text-muted);font-size:15px}
.migrating-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}.migrating-screen p{font-size:14px;color:var(--text-sub)}
.trip-card .share-trip{position:absolute;right:60px;top:8px;width:22px;height:22px;border-radius:5px;border:none;background:transparent;color:var(--text-muted);font-size:12px;display:none;align-items:center;justify-content:center}.trip-card:hover .share-trip{display:flex}.trip-card .share-trip:hover{background:var(--accent-bg);color:var(--accent)}
.year-nav{display:flex;align-items:center;justify-content:space-between;padding:6px 6px 12px;margin-bottom:2px}.year-nav .year-label{font-size:14px;font-weight:700;color:var(--text)}.year-nav button{width:26px;height:26px;border-radius:5px;border:none;background:transparent;color:var(--text-muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}.year-nav button:hover{background:var(--bg-hover)}
.join-trip-btn{padding:8px 12px;border-radius:8px;border:none;width:100%;font-size:13px;font-weight:500;background:transparent;color:var(--text-muted);margin-top:4px;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer}.join-trip-btn:hover{background:var(--bg-hover);color:var(--text)}
.private-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;user-select:none;font-size:13px;color:var(--text-sub)}.private-row input{cursor:pointer}
.res-card-trip{font-weight:700;color:var(--text)}
.member-checks-wrap{display:flex;flex-wrap:wrap;gap:5px;padding:4px 0}
.member-check{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);font-size:13px;cursor:pointer;user-select:none;transition:all .12s;color:var(--text-sub)}.member-check:has(input:checked){background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}.member-check input{display:none}
.tab-bar{display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border-light);overflow-x:auto;-webkit-overflow-scrolling:touch}.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:9px 16px;border:none;border-bottom:2px solid transparent;background:transparent;font-size:13px;font-weight:500;color:var(--text-sub);cursor:pointer;margin-bottom:-1px;transition:color .12s;white-space:nowrap;flex-shrink:0}.tab-btn:hover{color:var(--text)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
.res-section-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;padding:10px 16px 6px;background:var(--bg-sidebar);border-bottom:1px solid var(--border-light)}
.detail-section{margin-bottom:24px}.detail-section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.detail-section-header h3{font-size:15px;font-weight:600}
.detail-table{width:100%;border-collapse:collapse;font-size:13px;border:1px solid var(--border-light);border-radius:8px;overflow:hidden;margin-bottom:12px}
.detail-table th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);background:var(--bg-sidebar);border-bottom:1px solid var(--border-light)}
.detail-table td{padding:10px 12px;border-bottom:1px solid var(--border-light);vertical-align:middle;line-height:1.5;font-size:13px}.detail-table tr:last-child td{border-bottom:none}
.detail-table .edit-cell{text-align:right;width:60px}
.detail-edit-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:#fff;font-size:12px;cursor:pointer;color:var(--text-sub)}.detail-edit-btn:hover{background:var(--bg-hover)}
.detail-card{background:#fff;border:1px solid var(--border-light);border-radius:10px;padding:16px;margin-bottom:10px}
.detail-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.detail-card-title{font-size:14px;font-weight:600}
.detail-kv{display:grid;grid-template-columns:80px 1fr;gap:6px 12px;font-size:13px}.detail-kv .kv-label{color:var(--text-muted);font-weight:500}
.flight-note-row{background:#fff8e1;border-left:3px solid #f59e0b;padding:8px 12px;font-size:12px;color:#92400e;border-radius:0 4px 4px 0}
.notes-area{width:100%;min-height:220px;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;line-height:1.7;transition:border-color .15s;color:var(--text)}
.notes-area:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.add-detail-btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);background:#fff;font-size:13px;font-weight:500;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}.add-detail-btn:hover{background:var(--bg-hover)}

.modal-overlay{position:fixed;inset:0;background:rgba(15,15,15,.6);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:12px;padding:24px;width:92%;max-width:480px;box-shadow:0 12px 40px rgba(0,0,0,.15),0 0 0 1px rgba(0,0,0,.05);animation:slideUp .2s ease;max-height:85vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h3{font-size:16px;font-weight:600;margin-bottom:18px}
.form-group{margin-bottom:12px}.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text-sub);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);font-size:13px;transition:border-color .15s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btn-cancel{padding:7px 16px;border-radius:var(--radius);border:1px solid var(--border);background:#fff;font-size:13px;font-weight:500;color:var(--text-sub)}.btn-cancel:hover{background:var(--bg-hover)}
.btn-save{padding:7px 20px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;transition:all .15s}.btn-save:hover{background:#2899c7}
.btn-danger{padding:7px 16px;border-radius:var(--radius);border:none;background:var(--red-bg);color:var(--red);font-size:13px;font-weight:500}.btn-danger:hover{background:#f8d0d0}
.detail-sub-sep{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.5px;padding:10px 0 8px;margin-top:4px;border-top:1px solid var(--border-light);text-transform:uppercase}
.img-parse-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px 14px;margin-bottom:16px;border-radius:8px;border:1.5px dashed var(--border);background:var(--bg-hover);font-size:13px;font-weight:500;color:var(--text-sub);cursor:pointer;transition:all .12s}.img-parse-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}.img-parse-btn:disabled{opacity:.6;cursor:not-allowed}

.trip-sel-btn{display:none}
.trip-dd-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.25)}
.trip-dd{position:fixed;top:50px;left:0;right:0;z-index:201;background:#fff;border-bottom:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.12);max-height:65vh;overflow-y:auto}
@keyframes slideDown{from{transform:translateY(-6px);opacity:0}to{transform:translateY(0);opacity:1}}
.trip-dd{animation:slideDown .15s ease}
.trip-dd-year{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 7px;background:var(--bg-sidebar);border-bottom:1px solid var(--border-light)}

];
let exchangeRates={KRW:1}; // rates relative to KRW
let ratesLoaded=false;

async function loadRates(){
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/KRW');
    const d=await r.json();
    if(d.rates){
      exchangeRates={KRW:1};
      for(const c of CURRENCIES){
        if(d.rates[c.code])exchangeRates[c.code]=d.rates[c.code];
      }
      ratesLoaded=true;
    }
  }catch(e){console.warn('환율 로드 실패, 기본값 사용');
    exchangeRates={KRW:1,JPY:0.1067,CNY:0.005,USD:0.00069,VND:17.86,IDR:11.36,THB:0.024,EUR:0.00064};
    ratesLoaded=true;
  }
}

function toKRW(amount,currency,customRate){
  if(!amount||currency==='KRW')return amount||0;
  if(customRate&&customRate>0)return Math.round(amount/customRate);
  const rate=exchangeRates[currency];
  if(!rate)return amount;
  return Math.round(amount/rate);
}

function fmtCurrency(amount,currency){
  if(!amount)return '—';
  const c=CURRENCIES.find(x=>x.code===currency)||CURRENCIES[0];
  if(currency==='KRW'||currency==='JPY'||currency==='VND'||currency==='IDR')
    return c.symbol+amount.toLocaleString('ko-KR');
  return c.symbol+amount.toLocaleString('ko-KR',{minimumFractionDigits:0,maximumFractionDigits:2});
}
function fmtKRW(n){return n?'₩'+n.toLocaleString('ko-KR'):'—';}

function myName(){

async function load(){
  const uid=S.user.uid;
  const t=await tC().where('members','array-contains',uid).get();
  S.trips=t.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{const da=((a.dates||'').match(/\d{4}[\/\-]\d{2}[\/\-]\d{2}/)||[''])[0].replace(/\//g,'-');const db=((b.dates||'').match(/\d{4}[\/\-]\d{2}[\/\-]\d{2}/)||[''])[0].replace(/\//g,'-');return da.localeCompare(db);});
  const tripIds=S.trips.filter(t=>t.id!=='_init').map(t=>t.id);
  if(!tripIds.length){S.reservations=[];S.places=[];return;}
  const batches=[];for(let i=0;i<tripIds.length;i+=30)batches.push(tripIds.slice(i,i+30));
  const results=await Promise.all(batches.map(ids=>rC().where('tripId','in',ids).get()));
  S.reservations=results.flatMap(r=>r.docs.map(d=>({id:d.id,...d.data()}))).filter(r=>!r.private||r.createdBy===uid);
  try{
    const pResults=await Promise.all(batches.map(ids=>pC().where('tripId','in',ids).get()));
    S.places=pResults.flatMap(r=>r.docs.map(d=>({id:d.id,...d.data()})));
  }catch(e){console.warn('places 로드 실패(무시):', e);S.places=[];}
}

// === 실시간 동기화 (onSnapshot) ===
let _unsubs=[],_resBatches={},_placeBatches={},_snapTimer=null;
function stopListeners(){_unsubs.forEach(fn=>fn());_unsubs=[];_resBatches={};_placeBatches={};}
function snapRender(){clearTimeout(_snapTimer);_snapTimer=setTimeout(render,100);}

function startListeners(){
  stopListeners();
  const uid=S.user.uid;
  _unsubs.push(tC().where('members','array-contains',uid).onSnapshot(snap=>{
    const oldIds=S.trips.map(t=>t.id).join(',');
    S.trips=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{const da=((a.dates||'').match(/\d{4}[\/\-]\d{2}[\/\-]\d{2}/)||[''])[0].replace(/\//g,'-');const db=((b.dates||'').match(/\d{4}[\/\-]\d{2}[\/\-]\d{2}/)||[''])[0].replace(/\//g,'-');return da.localeCompare(db);});
    const newIds=S.trips.map(t=>t.id).join(',');
    if(oldIds!==newIds)startSubListeners();
    snapRender();
  },e=>{console.warn('trips listener err:',e);}));
}

function startSubListeners(){
  const tripUnsub=_unsubs[0];for(let i=1;i<_unsubs.length;i++)_unsubs[i]();
  _unsubs=[tripUnsub];_resBatches={};_placeBatches={};
  const uid=S.user.uid;
  const tripIds=S.trips.filter(t=>t.id!=='_init').map(t=>t.id);
  if(!tripIds.length){S.reservations=[];S.places=[];snapRender();return;}
  const batches=[];for(let i=0;i<tripIds.length;i+=30)batches.push(tripIds.slice(i,i+30));
  batches.forEach((ids,i)=>{
    _unsubs.push(rC().where('tripId','in',ids).onSnapshot(snap=>{
      _resBatches[i]=snap.docs.map(d=>({id:d.id,...d.data()}));
      S.reservations=Object.values(_resBatches).flat().filter(r=>!r.private||r.createdBy===uid);
      snapRender();
    },e=>{console.warn('res listener err:',e);}));
    _unsubs.push(pC().where('tripId','in',ids).onSnapshot(snap=>{
      _placeBatches[i]=snap.docs.map(d=>({id:d.id,...d.data()}));
      S.places=Object.values(_placeBatches).flat();
      snapRender();
    },e=>{console.warn('places listener err:',e);}));
  });
}

async function migrateData(){
  const uid=S.user.uid;const oldCol=db.collection('users').doc(uid);
  const oldTrips=await oldCol.collection('trips').get();
  if(oldTrips.empty)return false;
  const tripIdMap={};const b=db.batch();const curYear=S.selectedYear;
  oldTrips.docs.forEach(doc=>{
    const newRef=tC().doc(doc.id);tripIdMap[doc.id]=doc.id;
    b.set(newRef,{...doc.data(),year:curYear,owner:uid,members:[uid],memberNames:{[uid]:myName()||S.user.email},inviteCode:genCode()});
  });
  const oldRes=await oldCol.collection('reservations').get();
  oldRes.docs.forEach(doc=>{
    const{trip,...rest}=doc.data();
    b.set(rC().doc(),{...rest,tripId:tripIdMap[trip]||trip,year:curYear,createdBy:uid,private:false});
  });
  await b.commit();
  const d=db.batch();
  oldTrips.docs.forEach(doc=>d.delete(doc.ref));oldRes.docs.forEach(doc=>d.delete(doc.ref));
  await d.commit();return true;
}

  SEED_R.forEach(r=>{const{trip,...rest}=r;b.set(rC().doc(),{...rest,tripId:trip,year:yr,createdBy:uid,private:false});});

}

async function joinByCode(code){
  const uid=S.user.uid;
  const q=await tC().where('inviteCode','==',code.toUpperCase()).limit(1).get();
  if(q.empty){alert('초대 코드를 찾을 수 없습니다');return;}
  const doc=q.docs[0];
  if(!doc.data().members.includes(uid)){
    await tC().doc(doc.id).update({members:firebase.firestore.FieldValue.arrayUnion(uid),[`memberNames.${uid}`]:myName()||S.user.email});
  }
  window.history.replaceState({},'','/');
}

async function chk(){
  const uid=S.user.uid;
  try{
    const oldData=await db.collection('users').doc(uid).collection('trips').limit(1).get();
    if(!oldData.empty){S.screen='migrating';render();await migrateData();}
  }catch(e){console.warn('마이그레이션 건너뜀 (권한 확인 필요):',e);}
  const inv=new URLSearchParams(window.location.search).get('invite');
  if(inv){try{await joinByCode(inv);}catch(e){console.warn(e);}}
  try{await load();}catch(e){console.warn('로드 오류:',e);S.trips=[];S.reservations=[];}
  const yearTrips=S.trips.filter(t=>t.year===S.selectedYear&&t.id!=='_init');
  if(!yearTrips.length&&!S.trips.length&&!inv){S.screen='app';render();return;}
  const savedTrip=localStorage.getItem('lastTripId_'+S.user.uid);
  if(savedTrip&&S.trips.find(t=>t.id===savedTrip))S.selectedTrip=savedTrip;
  S.screen='app';render();
}

async function signIn(){
  if(isInAppBrowser()){openInExtBrowser();return;}
  // 모바일/데스크톱 모두 팝업 우선 (redirect는 iOS Safari ITP에서 storage blocked됨)
  // firebase.json에 COOP: same-origin-allow-popups 추가로 팝업 통신 허용됨

    await auth.signInWithPopup(gp);
  }catch(e){
    if(e.code==='auth/popup-blocked'||e.code==='auth/popup-closed-by-user'||e.code==='auth/cancelled-popup-request'){
      // 팝업이 완전히 막힌 경우에만 redirect로 폴백
      await auth.signInWithRedirect(gp);
    }else{
      alert('로그인 실패: '+e.message);
    }
  }
}

function isInAppBrowser(){
  const ua=navigator.userAgent||'';
  return /KAKAOTALK|Instagram|NAVER|NaverApp|Line|FB_IAB|FBIOS|Twitter|Snapchat|MicroMessenger/i.test(ua)||
    (/Android/.test(ua)&&/wv\)/.test(ua));
}
function openInExtBrowser(){
  const url=location.href;
  if(/Android/i.test(navigator.userAgent)){
    location.href='intent:'+url+'#Intent;scheme=https;package=com.android.chrome;end';
  }else{
    navigator.clipboard?.writeText(url).then(()=>alert('주소를 복사했어요.\nSafari 주소창에 붙여넣기 해주세요 😊')).catch(()=>alert('Safari 또는 Chrome에서 열어주세요:\n'+url));
  }
}

async function delTrip(id){if(!confirm('이 여행과 관련 예약을 모두 삭제할까요?'))return;await tC().doc(id).delete();const rel=S.reservations.filter(r=>r.tripId===id);for(const r of rel)await rC().doc(r.id).delete();S.trips=S.trips.filter(t=>t.id!==id);S.reservations=S.reservations.filter(r=>r.tripId!==id);if(S.selectedTrip===id)S.selectedTrip=null;render();}

function fil(){let r=S.selectedTrip?S.reservations.filter(x=>x.tripId===S.selectedTrip):S.reservations.filter(x=>{const trip=S.trips.find(t=>t.id===x.tripId);if(!trip||trip.year!==S.selectedYear)return false;if(S.tripFilter==='domestic'&&trip.country!=='KR')return false;if(S.tripFilter==='abroad'&&(!trip.country||trip.country==='KR'))return false;return true;});if(S.filterStatus!=='all')r=r.filter(x=>x.status===S.filterStatus);if(S.filterCategory!=='all')r=r.filter(x=>x.category===S.filterCategory);return r;}

function rSetup(){return`<div class="setup-screen"><div class="setup-box"><h2>🎉 처음이시네요!</h2><p class="desc">노션에서 가져온 여행 데이터를 자동으로 세팅할까요?</p><div class="setup-actions"><button class="btn-cancel" onclick="skipSeed()">빈 상태로 시작</button><button class="btn-save" onclick="doSeed()">샘플 데이터 불러오기</button></div></div></div>`;}
window.doSeed=async()=>{await seed();await load();S.screen='app';render();};

function rApp(){
  const res=fil(); // 필터 적용 (가계부 탭 전용)
  const sel=S.trips.find(t=>t.id===S.selectedTrip);
  // 항공/숙소/렌터카/정산 탭은 필터 무시하고 해당 여행 전체 예약 사용
  const tripRes=sel?S.reservations.filter(x=>x.tripId===sel.id):res;
  if(sel&&S.activeTab==='cars'&&!tripRes.some(r=>r.category==='렌터카'))S.activeTab='budget';
  const mainContent=sel?rTabBar(tripRes)+rTabContent(sel,res,tripRes):rFilters()+(S.filterCategory==='all'?rCatSummary(res):rTable(res));
  return`${rHeader()}${S.tripDropdown?rTripDropdown():''}<div class="app-layout"><div class="sidebar">${rSidebar()}</div><div class="main">${rSummary(res,sel)}${rMainTop(sel)}${mainContent}</div></div><button class="fab" onclick="openRM()" title="새 예약">＋</button>${S.modal?rModal():''}${S.statusPicker?rStatusPicker():''}`;
}

function rHeader(){
  const u=S.user;const nm=myName();

}

function rTripDropdown(){
  const yr=S.selectedYear;
  const trips=S.trips.filter(t=>t.id!=='_init'&&t.year===yr);
  const items=trips.map(t=>`<div class="trip-dd-item${S.selectedTrip===t.id?' active':''}" onclick="selT('${t.id}')"><span>${t.emoji||'✈️'}</span><span style="flex:1">${t.name}</span>${S.selectedTrip===t.id?'<span class="dd-check">✓</span>':''}</div>`).join('');

}

function rSidebar(){const yr=S.selectedYear;const allTrips=S.trips.filter(t=>t.id!=='_init'&&t.year===yr);const trips=S.tripFilter==='domestic'?allTrips.filter(t=>t.country==='KR'):S.tripFilter==='abroad'?allTrips.filter(t=>t.country&&t.country!=='KR'):allTrips;
function tripMonth(t){const m=(t.dates||'').match(/\d{4}[\/\-](\d{2})[\/\-]\d{2}/);return m?parseInt(m[1])+'월':'';}
const hasDomestic=allTrips.some(t=>t.country==='KR');const hasAbroad=allTrips.some(t=>t.country&&t.country!=='KR');
const filterBtns=(hasDomestic&&hasAbroad)?`<div style="display:flex;gap:3px;margin-bottom:8px">${[['all','전체'],['domestic','🇰🇷 국내'],['abroad','🌏 해외']].map(([v,l])=>`<button class="filter-btn ${S.tripFilter===v?'active':''}" style="font-size:11px;padding:3px 8px" onclick="S.tripFilter='${v}';render()">${l}</button>`).join('')}</div>`:''
return`<div class="year-nav"><button onclick="setYear(${yr-1})">‹</button><span class="year-label">${yr}년</span><button onclick="setYear(${yr+1})">›</button></div>${filterBtns}<button class="trip-all ${S.selectedTrip===null?'active':''}" onclick="selT(null)"><span class="ico">📋</span> 전체 보기</button>${trips.map(t=>{const tr=S.reservations.filter(r=>r.tripId===t.id);const tot=tr.length;const ns=tr.some(r=>r.status==='정산필요');const spent=tr.reduce((s,r)=>s+getKRW(r),0);const dp=(t.dates||'').split(/\s*[→~]\s*/);const tStart=(dp[0]||'').trim().replace(/\//g,'-');const tEnd=(dp[1]||'').trim().replace(/\//g,'-');const isPast=tEnd&&tEnd<new Date().toISOString().slice(0,10);return`<div class="trip-card ${S.selectedTrip===t.id?'active':''}${isPast?' past':''}" onclick="selT('${t.id}')"><button class="share-trip" onclick="event.stopPropagation();copyInvite('${t.inviteCode||''}','${t.name||''}')" title="초대 링크 복사">🔗</button><button class="edit-trip" onclick="event.stopPropagation();editTrip('${t.id}')" title="수정">✎</button><button class="delete-trip" onclick="event.stopPropagation();delTrip('${t.id}')" title="삭제">✕</button><div class="card-top"><div class="card-emoji">${t.emoji||'✈️'}</div><div class="card-info"><div class="card-month">${tripMonth(t)}</div><div class="card-city">${t.name}</div><div class="card-dates">${t.dates||''}</div></div></div><div class="card-bottom"><div class="card-stats"><span>👥 ${t.people||0}명</span>${ns?'<div class="settle-dot"></div>':''}</div><div class="card-money">${spent>0?fmtKRW(spent):'—'}</div></div><div class="card-progress"><div class="card-progress-fill" style="width:${tot?(tr.filter(r=>r.status!=='미예약').length/tot*100):0}%"></div></div></div>`;}).join('')}<button class="add-trip-btn" onclick="openTM()">+ 새 여행</button><button class="join-trip-btn" onclick="openJoinM()">🔗 초대 코드로 참가</button><button class="join-trip-btn" onclick="openNameFixM()" style="font-size:12px;color:var(--text-muted)">🔄 이름 일괄 변경</button>`;}

function rSummary(res,sel){
  const mn=myName();
  function myShare(r){const ppl=r.people||[];return mn&&ppl.includes(mn)?Math.round(getKRW(r)/ppl.length):0;}
  const isAll=!sel;
  const calc=isAll?(r=>myShare(r)):(r=>getKRW(r));
  const t=res.reduce((s,r)=>s+calc(r),0);
  const st=res.filter(r=>r.status==='정산완료').reduce((s,r)=>s+calc(r),0);
  const nd=res.filter(r=>r.status==='정산필요').reduce((s,r)=>s+calc(r),0);
  const ub=res.filter(r=>r.status==='미예약').length;
  const label=isAll?'나의 지출':'총 지출';
  const myTotal=!isAll?res.reduce((s,r)=>s+myShare(r),0):0;
  const stCnt=res.filter(r=>r.status==='정산완료').length;const ndCnt=res.filter(r=>r.status==='정산필요').length;
  return`<div class="summary-row"><div class="summary-card"><div class="label">${label}</div><div class="value">${fmtKRW(t)}</div></div>${!isAll&&mn?`<div class="summary-card"><div class="label">나의 지출</div><div class="value" style="color:var(--accent)">${fmtKRW(myTotal)}</div></div>`:''}<div class="summary-card"><div class="label">정산</div><div class="value" style="font-size:13px;line-height:1.5"><span style="font-size:11px;color:var(--text-muted)">완료</span> <span class="green">${fmtKRW(st)}</span> <span style="font-size:11px;color:var(--text-muted)">${stCnt}건</span><br><span style="font-size:11px;color:var(--text-muted)">필요</span> <span class="orange">${fmtKRW(nd)}</span> <span style="font-size:11px;color:var(--text-muted)">${ndCnt}건</span></div></div><div class="summary-card"><div class="label">미예약</div><div class="value red">${ub}건</div></div></div>`;
}

function rSettleBanner(tripId){
  const mn=myName();if(!mn)return'';
  const need=S.reservations.filter(r=>r.tripId===tripId&&r.status==='정산필요'&&r.payer&&r.people?.length&&getKRW(r)>0);
  if(!need.length)return'';
  const{bal}=calcSettlement(need);
  const myBal=Math.round(bal[mn]||0);
  if(Math.abs(myBal)<100)return`<div class="settle-banner zero">✓ 정산 완료 상태예요</div>`;
  if(myBal>0)return`<div class="settle-banner recv">💚 나는 <strong>${fmtKRW(myBal)}</strong> 받을 예정이에요 <span style="margin-left:auto;font-size:12px;opacity:.7;cursor:pointer" onclick="setTab('settle')">자세히 →</span></div>`;
  return`<div class="settle-banner owe">🔴 나는 <strong>${fmtKRW(-myBal)}</strong> 줄 예정이에요 <span style="margin-left:auto;font-size:12px;opacity:.7;cursor:pointer" onclick="setTab('settle')">자세히 →</span></div>`;
}

function rMainTop(sel){
  let memberRow='';
  if(sel){
    const memberNames=Object.values(sel.memberNames||{});
    const _mn=myName();
    const chips=memberNames.map(n=>`<span class="member-chip${n===_mn?' me':''}">${n}</span>`).join('');
    const allPpl=[...new Set(S.reservations.filter(r=>r.tripId===sel.id).flatMap(r=>r.people||[]))];
    const guests=allPpl.filter(p=>!memberNames.includes(p));
    const guestChips=guests.map(n=>`<span class="member-chip guest" onclick="openNameFixM('${n.replace(/'/g,"\\'")}')" style="cursor:pointer" title="클릭해서 이름 변경">${n} ✎</span>`).join('');
    memberRow=`<div style="display:flex;flex-wrap:wrap;align-items:center;gap:4px;margin-top:6px">${chips}${guestChips}${guests.length?`<span style="font-size:11px;color:var(--text-muted);margin-left:2px">미가입</span>`:''}</div>`;
  }
  const banner=sel?rSettleBanner(sel.id):'';
  return`<div class="main-top"><div><h2>${sel?`${sel.emoji||''} ${sel.name}`:'전체 예약'}</h2>${sel?`<div class="sub">${sel.dates||''}</div>${memberRow}`:''}</div><div style="display:flex;gap:6px;align-self:flex-start">${sel?`<button class="add-res-btn" onclick="openMembersM('${sel.id}')">👥 멤버</button>`:''}<button class="add-res-btn" onclick="openRM()"><span>+</span> 새 예약</button></div></div>${banner}`;
}

function rFilters(){return`<div class="filters">${['all','정산완료','정산필요','미예약'].map(s=>`<button class="filter-btn ${S.filterStatus===s?'active':''}" onclick="setF('s','${s}')">${s==='all'?'전체':s}</button>`).join('')}</div>`;}
function rTripFilters(){const cats=Object.keys(CI);const cur=S.filterCategory;return`<div class="filters">${['all','정산완료','정산필요','미예약'].map(s=>`<button class="filter-btn ${S.filterStatus===s?'active':''}" onclick="setF('s','${s}')">${s==='all'?'전체':s}</button>`).join('')}<select class="filter-select" onchange="setF('c',this.value)"><option value="all" ${cur==='all'?'selected':''}>전체 카테고리</option>${cats.map(c=>`<option value="${c}" ${cur===c?'selected':''}>${CI[c]} ${c}</option>`).join('')}</select></div>`;}

function rCatSummary(res){
  if(!res.length)return`<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:14px">예약이 없습니다</div>`;
  const mn=myName();
  const cats=Object.keys(CI);
  const extraCats=[...new Set(res.map(r=>r.category).filter(c=>c&&!cats.includes(c)))];
  const cards=[...cats,...extraCats].map(cat=>{
    const items=res.filter(r=>r.category===cat);
    if(!items.length)return'';
    const myTotal=items.reduce((s,r)=>{const ppl=r.people||[];return s+(mn&&ppl.includes(mn)?Math.round(getKRW(r)/ppl.length):0);},0);
    const done=items.filter(r=>r.status==='정산완료').length;
    const need=items.filter(r=>r.status==='정산필요').length;
    const none=items.filter(r=>r.status==='미예약').length;
    return`<div class="cat-summary-card" onclick="setF('c','${cat}')">
      <div class="cat-sum-top"><span class="cat-sum-icon">${CI[cat]||'📦'}</span><span class="cat-sum-name">${cat}</span><span class="cat-sum-count">${items.length}건</span></div>
      <div class="cat-sum-amount">${myTotal?fmtKRW(myTotal):'—'}</div>
      <div class="cat-sum-badges">${done?`<span class="cat-sum-badge done">✓ ${done}</span>`:''}${need?`<span class="cat-sum-badge need">! ${need}</span>`:''}${none?`<span class="cat-sum-badge none">✕ ${none}</span>`:''}</div>
    </div>`;
  }).join('');
  const grandTotal=res.reduce((s,r)=>{const ppl=r.people||[];return s+(mn&&ppl.includes(mn)?Math.round(getKRW(r)/ppl.length):0);},0);
  const totalBar=`<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border-light)"><span style="font-size:13px;color:var(--text-sub)">나의 총 지출</span><span style="font-size:22px;font-weight:700;letter-spacing:-.5px">${grandTotal?fmtKRW(grandTotal):'—'}</span></div>`;
  return`<div>${totalBar}<div class="cat-summary-grid">${cards}</div></div>`;
}

function renderNotesMd(text){
  if(!text)return`<p style="color:var(--text-muted);font-size:13px">아직 메모가 없어요. 수정 버튼을 눌러 작성해보세요.</p>`;
  const escaped=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return escaped.split('\n').map(line=>{
    if(/^# (.+)/.test(line))return`<h3 style="font-size:16px;font-weight:700;margin:14px 0 5px;color:var(--text)">${line.slice(2)}</h3>`;
    if(/^## (.+)/.test(line))return`<h4 style="font-size:14px;font-weight:600;margin:12px 0 4px;color:var(--text)">${line.slice(3)}</h4>`;
    if(/^[-*] (.+)/.test(line))return`<div style="display:flex;gap:8px;margin:3px 0;font-size:13px"><span style="color:var(--accent);flex-shrink:0">•</span><span>${line.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').slice(2)}</span></div>`;
    if(line==='')return`<div style="height:6px"></div>`;
    return`<div style="margin:3px 0;font-size:13px;line-height:1.7">${line.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>`;
  }).join('');
}
function getTripDays(trip){
  const dp=(trip.dates||'').split(/\s*[→~]\s*/);
  const ds=(dp[0]||'').trim().replace(/\//g,'-');
  const de=(dp[1]||'').trim().replace(/\//g,'-');
  if(!ds||!de)return[];
  const start=new Date(ds),end=new Date(de);
  if(isNaN(start)||isNaN(end))return[];
  const days=[];
  for(let i=0,d=new Date(start);d<=end&&i<14;i++,d=new Date(d.getTime()+86400000))
    days.push({n:i+1,date:d.toISOString().slice(0,10)});
  return days;
}

function calcSettlement(res){
  const bal={};
  for(const r of res){
    if(!r.payer||!r.people||!r.people.length)continue;
    const krw=getKRW(r);if(!krw)continue;
    const share=krw/r.people.length;
    if(!bal[r.payer])bal[r.payer]=0;
    bal[r.payer]+=krw;
    for(const p of r.people){if(!bal[p])bal[p]=0;bal[p]-=share;}
  }
  const dArr=Object.entries(bal).filter(([,b])=>b<-0.5).map(([n,b])=>({name:n,amt:-b})).sort((a,b)=>b.amt-a.amt);
  const cArr=Object.entries(bal).filter(([,b])=>b>0.5).map(([n,b])=>({name:n,amt:b})).sort((a,b)=>b.amt-a.amt);
  const transfers=[];let i=0,j=0;
  const d=[...dArr.map(x=>({...x}))],c=[...cArr.map(x=>({...x}))];
  while(i<d.length&&j<c.length){const amt=Math.min(d[i].amt,c[j].amt);transfers.push({from:d[i].name,to:c[j].name,amount:Math.round(amt)});d[i].amt-=amt;c[j].amt-=amt;if(d[i].amt<0.5)i++;if(c[j].amt<0.5)j++;}
  return{bal,transfers};
}

function rTable(res,trip){if(!res.length)return`<div class="res-table"><div class="empty-state">예약이 없습니다</div></div>`;
const sorted=[...res].sort((a,b)=>{if(!trip){const ta=S.trips.find(t=>t.id===a.tripId),tb=S.trips.find(t=>t.id===b.tripId);const da=((ta?.dates||'').match(/\d{4}[\/\-]\d{2}[\/\-]\d{2}/)||[''])[0].replace(/\//g,'-');const db=((tb?.dates||'').match(/\d{4}[\/\-]\d{2}[\/\-]\d{2}/)||[''])[0].replace(/\//g,'-');const tc=da.localeCompare(db);if(tc!==0)return tc;}if(!a.date&&!b.date)return 0;if(!a.date)return 1;if(!b.date)return-1;return a.date.replace(/\//g,'-').localeCompare(b.date.replace(/\//g,'-'));});
const mn0=myName();const t=trip?res.reduce((s,r)=>s+getKRW(r),0):res.reduce((s,r)=>{const ppl=r.people||[];return s+(mn0&&ppl.includes(mn0)?Math.round(getKRW(r)/Math.max(ppl.length,1)):0);},0);
function cardHtml(r){const cc=CC[r.category]||'usim';const sc=r.status==='정산완료'?'done':r.status==='정산필요'?'need':'none';const si=r.status==='정산완료'?'✓':r.status==='정산필요'?'!':'✕';const cur=r.currency||'KRW';const krw=getKRW(r);const showFx=cur!=='KRW'&&r.total>0;const tripObj=!S.selectedTrip?S.trips.find(t=>t.id===r.tripId):null;const tripName=tripObj?tripObj.name:'';const metaText=[r.vendor,fmtDate(r.date)].filter(Boolean).join(' · ');const metaHtml=[tripName?`<span class="res-card-trip">${tripName}</span>`:'',r.memo,metaText].filter(Boolean).join(' · ');const ppl=r.people||[];const mn=myName();const sortedPpl=mn&&ppl.includes(mn)?[mn,...ppl.filter(p=>p!==mn)]:ppl;const myShare=mn&&ppl.includes(mn)?Math.round(krw/Math.max(ppl.length,1)):0;const rTrip=trip||tripObj;const isAllMembers=rTrip&&rTrip.members&&ppl.length>=rTrip.members.length&&ppl.length>0;const pplText=isAllMembers?'전체':sortedPpl.length===1?sortedPpl[0]:sortedPpl.length>1?sortedPpl[0]+' 외 '+(sortedPpl.length-1)+'명':'';
const isAll=!trip;const dispAmt=isAll?(myShare||0):krw;const dispFx=!isAll&&showFx;
return`<div class="res-card" onclick="editR('${r.id}')"><div class="res-card-icon ${cc}">${CI[r.category]||'📦'}</div><div class="res-card-body"><div class="res-card-top"><div class="res-card-name">${r.name}</div><div class="res-card-amount ${(isAll?dispAmt:r.total)?'':'zero'}">${(isAll?dispAmt:r.total)?fmtKRW(dispAmt):'—'}${dispFx?`<div class="res-card-fx">${fmtCurrency(r.total,cur)}</div>`:''}</div></div>${metaHtml?`<div class="res-card-meta">${metaHtml}</div>`:''}<div class="res-card-bottom"><span class="status-tag ${sc} clickable" onclick="showStatusPicker(event,'${r.id}','${r.status}',this)" title="탭해서 상태 변경">${si} ${r.status}</span>${r.payer?`<span class="res-card-payer">💳 ${r.payer}</span>`:''}${pplText?`<span class="res-card-people">👥 ${pplText}</span>`:''}${!isAll&&myShare?`<span class="res-card-share">내 ${fmtKRW(myShare)}</span>`:''}</div></div><button class="del-btn" onclick="event.stopPropagation();delR('${r.id}')" title="삭제">✕</button></div>`;}

  if(sm&&days.length){

      if(dayItems.length)body+=`<div class="res-section-label">Day ${d.n} · ${d.date.slice(5).replace('-','/')}</div>${dayItems.map(cardHtml).join('')}`;

function getPayerSelect(tripId,selectedPayer){
  const trip=S.trips.find(t=>t.id===tripId);
  const mn=myName();
  let members=trip?Object.values(trip.memberNames||{}):[];
  if(mn&&members.includes(mn))members=[mn,...members.filter(m=>m!==mn)];
  const isExtra=selectedPayer&&!members.includes(selectedPayer);
  return`<select id="r-payer"><option value="">미정</option>${members.map(n=>`<option value="${n}" ${!isExtra&&selectedPayer===n?'selected':''}>${n}</option>`).join('')}</select><input id="r-payer-extra" value="${isExtra?selectedPayer:''}" placeholder="또는 직접 입력 (비가입 멤버)" style="margin-top:6px;width:100%">`;
}

function getMemberChecks(tripId,selectedPeople){
  const trip=S.trips.find(t=>t.id===tripId);
  if(!trip||!trip.memberNames||!Object.keys(trip.memberNames).length)return '';
  const mn=myName();
  let members=Object.values(trip.memberNames);
  if(mn&&members.includes(mn))members=[mn,...members.filter(m=>m!==mn)];
  return members.map(name=>`<label class="member-check"><input type="checkbox" name="r-ppl-cb" value="${name.replace(/"/g,'&quot;')}" ${selectedPeople.includes(name)?'checked':''}>${name}</label>`).join('');
}

window.onCurChange=function(){
  const cur=document.getElementById('r-cur').value;
  const area=document.getElementById('fx-area');
  const tot=parseFloat(document.getElementById('r-tot').value)||0;
  if(cur==='KRW'){area.innerHTML='';}

async function getGeminiModels(key){
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
  if(!r.ok)return[];
  const d=await r.json();
  const all=(d.models||[]).filter(m=>m.supportedGenerationMethods?.includes('generateContent')).map(m=>m.name.replace('models/',''));
  const prefer=['gemini-1.5-flash-8b','gemini-1.5-flash','gemini-2.0-flash','gemini-1.5-pro'];
  const sorted=[];
  for(const p of prefer){const f=all.find(n=>n.startsWith(p));if(f)sorted.push(f);}
  for(const m of all){if(!sorted.includes(m))sorted.push(m);}
  return sorted;
}

async function parseImageWithGemini(base64,mediaType,type){

  const prompts={
    flight:`이 이미지에서 항공편 정보를 추출해 아래 JSON 형식으로만 반환해주세요. 없으면 빈 문자열:

  const uid=S.user.uid;const oldNick=myName();

  localStorage.setItem('nick_'+uid,newNick);
  const b=db.batch();

  S.trips.filter(t=>t.members?.includes(uid)).forEach(t=>b.update(tC().doc(t.id),{[`memberNames.${uid}`]:newNick}));
  // 예약 people + payer에서 옛 이름 → 새 이름
  const resToFix=S.reservations.filter(r=>r.people?.includes(oldNick)||r.payer===oldNick);
  resToFix.forEach(r=>{
    const newPeople=(r.people||[]).map(p=>p===oldNick?newNick:p);
    const krw=getKRW(r);
    const upd={people:newPeople,perPerson:newPeople.length?Math.round(krw/newPeople.length):0};
    if(r.payer===oldNick)upd.payer=newNick;
    b.update(rC().doc(r.id),upd);
  });
  await b.commit();
  // 로컬 상태 업데이트
  S.trips=S.trips.map(t=>t.members?.includes(uid)?{...t,memberNames:{...t.memberNames,[uid]:newNick}}:t);
  S.reservations=S.reservations.map(r=>{
    const inPeople=r.people?.includes(oldNick);const inPayer=r.payer===oldNick;
    if(!inPeople&&!inPayer)return r;
    const newPeople=(r.people||[]).map(p=>p===oldNick?newNick:p);

function initWishMap(tripId){
  const container=document.getElementById('wishlist-map');

  if(window._wishMap){try{window._wishMap.remove();}catch(e){}window._wishMap=null;}
  const places=S.places.filter(p=>p.tripId===tripId&&p.lat&&p.lng);
  const ws=window._wishMapState;
  let center=places.length?[places[0].lat,places[0].lng]:[37.5665,126.9780],zoom=13;
  if(ws&&ws.tripId===tripId){center=[ws.lat,ws.lng];zoom=ws.zoom;}
  const map=L.map(container).setView(center,zoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a>',maxZoom:19}).addTo(map);
  window._wishMap=map;
  map.on('moveend',()=>{const c=map.getCenter();window._wishMapState={tripId,lat:c.lat,lng:c.lng,zoom:map.getZoom()};});
  map.on('click',e=>{
    openModal({type:'place',data:{lat:e.latlng.lat,lng:e.latlng.lng,category:'관광지'},tripId});
  });
  if(S.wishView==='itinerary'){
    // 일정 모드: 선택된 일차 장소만 번호 마커 + 경로선
    const dayPlaces=places.filter(p=>{const ds=p.days||(p.day!=null?[p.day]:[]);return S.wishDay===null?ds.length===0:ds.includes(S.wishDay);}).sort((a,b)=>((a.dayOrder||{})[S.wishDay]??a.order??999)-((b.dayOrder||{})[S.wishDay]??b.order??999));
    dayPlaces.forEach((p,i)=>{
      const shortName=p.name.length>12?p.name.slice(0,11)+'…':p.name;
      const html=`<div style="display:flex;flex-direction:column;align-items:center;gap:2px;opacity:${p.visited?.4:1}">
        <div style="width:26px;height:26px;border-radius:50%;background:var(--accent,#2eaadc);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.3)">${i+1}</div>

      </div>`;
      const icon=L.divIcon({className:'',html,iconSize:[110,46],iconAnchor:[13,13]});
      L.marker([p.lat,p.lng],{icon}).addTo(map).bindPopup(`<strong>${p.name}</strong>${p.note?`<br><span style="font-size:11px">${p.note}</span>`:''}`);
    });

      L.polyline(dayPlaces.map(p=>[p.lat,p.lng]),{color:'#2eaadc',weight:2.5,opacity:0.7,dashArray:'6,6'}).addTo(map);
    }

async function _searchNominatim(query,cityHint){
  const q=cityHint?`${query} ${cityHint}`:query;
  const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1&accept-language=ko`,{headers:{'Accept-Language':'ko'}});
  let data=await r.json();
  if(!data.length&&cityHint){
    const r2=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=6&addressdetails=1&accept-language=ko`,{headers:{'Accept-Language':'ko'}});
    data=await r2.json();
  }
  return data.map(d=>{
    const a=d.address||{};
    const name=d.name||d.display_name.split(',')[0];
    const area=[a.suburb||a.neighbourhood||a.district||a.road,a.city||a.town||a.county||a.province,a.country].filter(Boolean).slice(0,2).join(' · ');
    return{type:'nominatim',name,area,lat:parseFloat(d.lat),lng:parseFloat(d.lon),address:d.display_name};
  });
}

async function doWishSearch(query){
  const el=document.getElementById('wish-search-results');
  if(!el)return;
  const cityHint=(S.trips.find(t=>t.id===S.selectedTrip)?.wishlistCity||'').trim();
  try{
    if(_gAutoSvc){
      // Google Places Autocomplete
      const input=cityHint?`${query} ${cityHint}`:query;
      _gAutoSvc.getPlacePredictions({input,language:'ko'},(preds,status)=>{
        if(!preds||!preds.length){
          // 결과 없으면 Nominatim 폴백
          _searchNominatim(query,cityHint).then(r=>_showWishResults(el,r)).catch(()=>{el.innerHTML='<div class="wish-search-item" style="color:var(--red)">검색 실패</div>';});
          return;
        }
        const results=preds.map(p=>({type:'google',placeId:p.place_id,name:p.structured_formatting.main_text,area:p.structured_formatting.secondary_text,lat:null,lng:null}));
        _showWishResults(el,results);
      });
    }else{
      // Google Places 미로드 시 Nominatim
      const results=await _searchNominatim(query,cityHint);
      _showWishResults(el,results);
    }
  }catch(e){el.innerHTML='<div class="wish-search-item" style="color:var(--red)">검색 실패</div>';}
}

function bd09ToWgs84(bdLat,bdLng){
  const x=bdLng-0.0065,y=bdLat-0.006;
  const z=Math.sqrt(x*x+y*y)-0.00002*Math.sin(y*Math.PI*3000/180);
  const theta=Math.atan2(y,x)-0.000003*Math.cos(x*Math.PI*3000/180);
  const gcjLng=z*Math.cos(theta),gcjLat=z*Math.sin(theta);
  const a=6378245,ee=0.00669342162296594323;
  const dLat=(lat,lng)=>{let r=-100+2*lng+3*lat+0.2*lat*lat+0.1*lng*lat+0.2*Math.sqrt(Math.abs(lng));r+=(20*Math.sin(6*lng*Math.PI)+20*Math.sin(2*lng*Math.PI))*2/3;r+=(20*Math.sin(lat*Math.PI)+40*Math.sin(lat/3*Math.PI))*2/3;r+=(160*Math.sin(lat/12*Math.PI)+320*Math.sin(lat*Math.PI/30))*2/3;return r;};
  const dLng=(lat,lng)=>{let r=300+lng+2*lat+0.1*lng*lng+0.1*lng*lat+0.1*Math.sqrt(Math.abs(lng));r+=(20*Math.sin(6*lng*Math.PI)+20*Math.sin(2*lng*Math.PI))*2/3;r+=(20*Math.sin(lng*Math.PI)+40*Math.sin(lng/3*Math.PI))*2/3;r+=(150*Math.sin(lng/12*Math.PI)+300*Math.sin(lng/30*Math.PI))*2/3;return r;};
  const radLat=gcjLat/180*Math.PI;let magic=Math.sin(radLat);magic=1-ee*magic*magic;const sq=Math.sqrt(magic);
  const dl=dLat(gcjLat-35,gcjLng-105)*(180/((a*(1-ee))/(magic*sq)*Math.PI));
  const dln=dLng(gcjLat-35,gcjLng-105)*(180/(a/sq*Math.cos(radLat)*Math.PI));
  return{lat:gcjLat-dl,lng:gcjLng-dln};
}
function bd09mcToWgs84(mx,my){
  // BD09MC(메르카토르) → BD09(위경도) → WGS84
  const lng_bd=mx/20037508.3427892*180;
  const lat_bd=Math.atan(Math.exp(my/20037508.3427892*Math.PI))*360/Math.PI-90;
  return bd09ToWgs84(lat_bd,lng_bd);
}
function parsePlaceCoord(val){
  // 바이두 URL: @13522880.86,3641841.58,19z 형식 (BD09MC 메르카토르)
  const urlM=val.match(/@([-\d.]+),([-\d.]+),[\d.]+z/);
  if(urlM){const r=bd09mcToWgs84(parseFloat(urlM[1]),parseFloat(urlM[2]));return{lat:r.lat,lng:r.lng,isBaidu:false,isMercator:true};}
  // 일반 좌표 (또는 숫자만 복사한 BD09MC)
  const m=val.match(/([-\d.]+)\s*[,，\s]\s*([-\d.]+)/);
  if(m){
    const n1=parseFloat(m[1]),n2=parseFloat(m[2]);
    // BD09MC 감지: 좌표값이 1000 초과면 메르카토르 좌표
    if(Math.abs(n1)>1000||Math.abs(n2)>1000){const r=bd09mcToWgs84(n1,n2);return{lat:r.lat,lng:r.lng,isBaidu:false,isMercator:true};}
    return{lat:n1,lng:n2,isBaidu:false,isMercator:false};
  }
  return null;
}
window.onPlaceCoordInput=function(val){
  const p=parsePlaceCoord(val);
  if(!p)return;
  // URL 붙여넣기면 좌표 필드 정리 + 바이두 체크박스 자동 해제
  if(p.isMercator){
    document.getElementById('pl-coord').value=`${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}`;
    if(document.getElementById('pl-is-baidu'))document.getElementById('pl-is-baidu').checked=false;

  }
  if(window._wishMap){const{lat,lng}=p;if(lat>=-90&&lat<=90&&lng>=-180&&lng<=180)window._wishMap.setView([lat,lng],15,{animate:true,duration:0.4});}
};
window.saveWishPlace=async function(eid,tripId){
  const name=document.getElementById('pl-name').value.trim();
  if(!name)return alert('장소명을 입력해주세요');
  const coordVal=document.getElementById('pl-coord').value;

  let lat=cp?.lat||0,lng=cp?.lng||0;
  if(cp&&!cp.isMercator&&document.getElementById('pl-is-baidu')?.checked){const w=bd09ToWgs84(lat,lng);lat=w.lat;lng=w.lng;}
  const checkedDays=[...document.querySelectorAll('input[name="pl-day-cb"]:checked')].map(cb=>parseInt(cb.value));
  const existingPlace=eid?S.places.find(p=>p.id===eid):null;
  const prevDayOrder=existingPlace?.dayOrder||{};
  const dayOrder={};
  checkedDays.forEach(dn=>{dayOrder[dn]=prevDayOrder[dn]??S.places.filter(p=>p.tripId===tripId&&(p.days||[]).includes(dn)).length;});
  const d={tripId,name,lat,lng,address:document.getElementById('pl-addr').value||'',category:document.getElementById('pl-cat').value,note:document.getElementById('pl-note').value.trim(),visited:existingPlace?.visited||false,days:checkedDays,dayOrder,createdBy:S.user.uid};
  if(eid){await pC().doc(eid).update(d);const i=S.places.findIndex(p=>p.id===eid);if(i>=0)S.places[i]={...S.places[i],...d};}
  else{const r=await pC().add(d);S.places.push({id:r.id,...d});}
  window._wishMapState=null;
  closeM();
};

  render();
};

window.movePlaceOrder=async function(id,dir){
  const p=S.places.find(x=>x.id===id);if(!p)return;
  const day=S.wishDay;
  const siblings=S.places.filter(x=>x.tripId===p.tripId&&(x.days||(x.day!=null?[x.day]:[])).includes(day)).sort((a,b)=>((a.dayOrder||{})[day]??a.order??999)-((b.dayOrder||{})[day]??b.order??999));
  const idx=siblings.findIndex(x=>x.id===id);
  const swapIdx=idx+dir;
  if(swapIdx<0||swapIdx>=siblings.length)return;
  const other=siblings[swapIdx];
  const aOrd=(p.dayOrder||{})[day]??idx;
  const bOrd=(other.dayOrder||{})[day]??swapIdx;
  const updA={dayOrder:{...(p.dayOrder||{}),[day]:bOrd}};
  const updB={dayOrder:{...(other.dayOrder||{}),[day]:aOrd}};
  await pC().doc(id).update(updA);
  await pC().doc(other.id).update(updB);
  p.dayOrder={...(p.dayOrder||{}),[day]:bOrd};
  other.dayOrder={...(other.dayOrder||{}),[day]:aOrd};
  const ws=window._wishMap?{tripId:p.tripId,lat:window._wishMap.getCenter().lat,lng:window._wishMap.getCenter().lng,zoom:window._wishMap.getZoom()}:window._wishMapState;
  window._wishMapState=ws;render();
};

window.focusWishPlace=function(lat,lng){
  if(window._wishMap){window._wishMap.setView([lat,lng],16);window._wishMapState={lat,lng,zoom:16};}
};
window.cycleStatus=async(id,cur)=>{const next={'미예약':'정산필요','정산필요':'정산완료','정산완료':'미예약'}[cur]||'미예약';await updR(id,{status:next});};
window.showStatusPicker=(e,id,cur,el)=>{
  e.stopPropagation();
  const r=el.getBoundingClientRect();
  S.statusPicker={id,cur,top:r.bottom+4,left:r.left};
  render();
};
window.pickStatus=async(status)=>{
  if(!S.statusPicker)return;
  const{id}=S.statusPicker;
  S.statusPicker=null;
  await updR(id,{status});
};
function rStatusPicker(){
  const p=S.statusPicker;if(!p)return'';
  const items=[
    {s:'미예약',color:'#9ca3af',bg:'#e5e7eb'},
    {s:'정산필요',color:'#ef4444',bg:'#fca5a5'},
    {s:'정산완료',color:'#10b981',bg:'#6ee7b7'},
  ];
  const maxLeft=Math.min(p.left,window.innerWidth-160);
  const maxTop=Math.min(p.top,window.innerHeight-150);
  return`<div class="status-picker-overlay" onclick="S.statusPicker=null;render()"></div><div class="status-picker" style="top:${maxTop}px;left:${maxLeft}px">${items.map(it=>`<div class="status-picker-item ${p.cur===it.s?'active':''}" onclick="event.stopPropagation();pickStatus('${it.s}')"><span class="sp-dot" style="background:${it.bg};border:1.5px solid ${it.color}"></span>${it.s}</div>`).join('')}</div>`;
}
window.toggleReturnFlight=function(){const sec=document.getElementById('fl-return-sec');if(sec)sec.style.display=document.getElementById('fl-type').value==='왕복'?'block':'none';};
window.toggleRMReturnFlight=function(){const sec=document.getElementById('r-fl-return-sec');if(sec)sec.style.display=document.getElementById('r-fl-type').value==='왕복'?'block':'none';};
window.onCategoryChange=function(){const cat=document.getElementById('r-cat').value;const map={'항공':'flight','숙소':'hotel','렌터카':'car'};['flight','hotel','car'].forEach(t=>{const el=document.getElementById('r-detail-'+t);if(el)el.style.display='none';});const el=document.getElementById('r-detail-'+(map[cat]||''));if(el)el.style.display='block';};
window.openRMWithCat=(cat,tripId)=>{const yr=S.selectedYear;openModal({type:'res',data:{name:'',memo:'',date:'',status:'미예약',vendor:'',total:0,currency:'KRW',fxRate:0,category:cat,people:[],tripId:tripId||(S.trips.find(t=>t.year===yr)?.id||''),private:false}});};
window.onTripChange=function(){const tripId=document.getElementById('r-trip').value;const el=document.getElementById('r-ppl-members');if(el)el.innerHTML=getMemberChecks(tripId,[]);const ex=document.getElementById('r-ppl-extra');if(ex)ex.value='';const pw=document.getElementById('r-payer-wrap');if(pw){pw.innerHTML=getPayerSelect(tripId,'');}const pe=document.getElementById('r-payer-extra');if(pe)pe.value='';};
window.openDetailModal=(type,idx,tripId)=>openModal({type:`detail-${type}`,idx:parseInt(idx),tripId});
window.saveDetail=async(type,idx,tripId)=>{
  const trip=S.trips.find(t=>t.id===tripId);let item={};
  if(type==='flight'){const isRT=document.getElementById('fl-type').value==='왕복';item={type:document.getElementById('fl-type').value,airline:document.getElementById('fl-airline').value.trim(),flightNo:document.getElementById('fl-no').value.trim(),duration:document.getElementById('fl-dur').value.trim(),from:document.getElementById('fl-from').value.trim(),fromDate:document.getElementById('fl-from-date').value||'',fromTime:document.getElementById('fl-from-time').value||'',to:document.getElementById('fl-to').value.trim(),toDate:document.getElementById('fl-to-date').value||'',toTime:document.getElementById('fl-to-time').value||'',notes:document.getElementById('fl-notes').value.trim(),...(isRT?{returnFlightNo:document.getElementById('fl-ret-no').value.trim(),returnDuration:document.getElementById('fl-ret-dur').value.trim(),returnFrom:document.getElementById('fl-ret-from').value.trim(),returnFromDate:document.getElementById('fl-ret-from-date').value||'',returnFromTime:document.getElementById('fl-ret-from-time').value||'',returnTo:document.getElementById('fl-ret-to').value.trim(),returnToDate:document.getElementById('fl-ret-to-date').value||'',returnToTime:document.getElementById('fl-ret-to-time').value||''}:{})};}
  else if(type==='hotel'){item={name:document.getElementById('ht-name').value.trim(),address:document.getElementById('ht-addr').value.trim(),checkIn:document.getElementById('ht-in').value,checkOut:document.getElementById('ht-out').value,mapUrl:document.getElementById('ht-map').value.trim()};}
  else if(type==='car'){item={vendor:document.getElementById('car-vendor').value.trim(),carType:document.getElementById('car-type').value.trim(),pickupLocation:document.getElementById('car-loc').value.trim(),pickupDate:document.getElementById('car-pick-date').value||'',pickupTime:document.getElementById('car-pick-time').value||'',returnDate:document.getElementById('car-ret-date').value||'',returnTime:document.getElementById('car-ret-time').value||'',};}
  const arr=[...(trip[type+'s']||[])];if(idx>=0)arr[idx]=item;else arr.push(item);
  await tC().doc(tripId).update({[type+'s']:arr});
  const i=S.trips.findIndex(t=>t.id===tripId);if(i>=0)S.trips[i]={...S.trips[i],[type+'s']:arr};
  closeM();
};
window.deleteDetail=async(type,idx,tripId)=>{if(!confirm('삭제할까요?'))return;const trip=S.trips.find(t=>t.id===tripId);const arr=[...(trip[type+'s']||[])];arr.splice(idx,1);await tC().doc(tripId).update({[type+'s']:arr});const i=S.trips.findIndex(t=>t.id===tripId);if(i>=0)S.trips[i]={...S.trips[i],[type+'s']:arr};closeM();};
window.saveNotes=async(tripId,btn)=>{const el=document.getElementById('trip-notes-ta');if(!el)return;const notes=el.value;await tC().doc(tripId).update({notes});const i=S.trips.findIndex(t=>t.id===tripId);if(i>=0)S.trips[i].notes=notes;S.notesEditing=false;render();};
window.toggleNotesEdit=(editing)=>{S.notesEditing=editing;render();};

render();
</script>
